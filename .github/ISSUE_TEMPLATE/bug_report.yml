name: Bug report
description: Something is broken — help us fix it.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections
        below so we can reproduce the issue quickly.
  - type: input
    id: version
    attributes:
      label: Commit / version
      description: Output of `git rev-parse --short HEAD` or the release tag.
      placeholder: e.g. `abc1234` or `v0.2.0`
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - backend / causal
        - backend / optimizer
        - backend / simulator
        - backend / api
        - frontend
        - docker / ops
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Ideally a minimal curl/pytest/pnpm command.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: text
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python/Node version, Docker version.
      placeholder: macOS 14.5, Python 3.11, Node 20, Docker 26
