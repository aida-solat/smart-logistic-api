name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: back/requirements.txt

      - name: Install system deps for psycopg2 / cvxpy
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpq-dev build-essential

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed minimal .env for tests
        run: |
          cat > .env <<EOF
          SECRET_KEY=test-secret
          DATABASE_URL=sqlite:///./test.db
          TRAFFIC_API_KEY=test
          WEATHER_API_KEY=test
          TRAFFIC_API_URL=https://example.com
          WEATHER_API_URL=https://example.com
          EOF

      - name: Run fast tests
        run: pytest tests/ -v --maxfail=3

  frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
