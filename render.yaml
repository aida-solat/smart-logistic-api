databases:
  - name: smart-logistics-db
    plan: free
    region: frankfurt
    databaseName: smart_logistics
    user: smart_logistics

services:
  - type: redis
    name: smart-logistics-redis
    plan: free
    region: frankfurt
    ipAllowList: []

  - type: web
    name: smart-logistics-api
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: back
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-logistics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smart-logistics-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: TRAFFIC_API_URL
        value: https://maps.googleapis.com/maps/api/distancematrix/json
      - key: WEATHER_API_URL
        value: https://api.openweathermap.org/data/3.0/onecall
      - key: TRAFFIC_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Set this to your Vercel URL after frontend deploy.
      # Comma-separate if you have multiple (e.g. preview deploys).
      - key: FRONTEND_URL
        sync: false
      # Set to "false" in prod to hide /docs and /redoc.
      - key: ENABLE_DOCS
        value: "false"
